    config_entry_id:
      selector:
        config_entry:
          integration: span_panel

get_monitoring_status:
  fields:
    config_entry_id:
      selector:
        config_entry:
          integration: span_panel

set_global_monitoring:
  fields:
    enabled:
      selector:
        boolean:
    continuous_threshold_pct:
      selector:
        number:
          min: 1
          max: 200
          unit_of_measurement: "%"
    spike_threshold_pct:
      selector:
        number:
          min: 1
          max: 200
          unit_of_measurement: "%"
    window_duration_m:
      selector:
        number:
          min: 1
          max: 180
          unit_of_measurement: min
    cooldown_duration_m:
      selector:
        number:
          min: 1
          max: 180
          unit_of_measurement: min
    notify_targets:
      selector:
        text:
    notification_title_template:
      selector:
        text:
    notification_message_template:
      selector:
        text:
    notification_priority:
      selector:
        select:
          options:
            - "default"
            - "passive"
            - "active"
            - "time-sensitive"
            - "critical"
    config_entry_id:
      selector:
        config_entry:
          integration: span_panel

test_notification:
