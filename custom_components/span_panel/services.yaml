        number:
          min: 1
          max: 180
          unit_of_measurement: min
    cooldown_duration_m:
      selector:
        number:
          min: 1
          max: 180
          unit_of_measurement: min
    monitoring_enabled:
      selector:
        boolean:
    config_entry_id:
      selector:
