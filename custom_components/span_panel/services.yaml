export_circuit_manifest:

set_circuit_threshold:
  fields:
    circuit_id:
      required: true
      selector:
        entity:
          domain: sensor
          integration: span_panel
          device_class: current
    continuous_threshold_pct:
      selector:
        number:
          min: 1
          max: 200
          unit_of_measurement: "%"
    spike_threshold_pct:
      selector:
        number:
          min: 1
          max: 200
          unit_of_measurement: "%"
    window_duration_m:
      selector:
        number:
          min: 1
          max: 180
          unit_of_measurement: min
    monitoring_enabled:
      selector:
        boolean:

clear_circuit_threshold:
  fields:
    circuit_id:
      required: true
      selector:
        entity:
          domain: sensor
          integration: span_panel
          device_class: current

set_mains_threshold:
  fields:
    leg:
      required: true
      selector:
        entity:
          domain: sensor
          integration: span_panel
          device_class: current
    continuous_threshold_pct:
      selector:
        number:
          min: 1
          max: 200
          unit_of_measurement: "%"
    spike_threshold_pct:
      selector:
        number:
          min: 1
          max: 200
          unit_of_measurement: "%"
    window_duration_m:
      selector:
        number:
          min: 1
          max: 180
          unit_of_measurement: min
    monitoring_enabled:
      selector:
        boolean:

clear_mains_threshold:
  fields:
    leg:
      required: true
      selector:
        entity:
          domain: sensor
          integration: span_panel
          device_class: current

get_monitoring_status:

set_global_monitoring:
  fields:
    enabled:
      selector:
        boolean:
    continuous_threshold_pct:
      selector:
        number:
          min: 1
          max: 200
          unit_of_measurement: "%"
    spike_threshold_pct:
      selector:
        number:
          min: 1
          max: 200
          unit_of_measurement: "%"
    window_duration_m:
      selector:
        number:
          min: 1
          max: 180
          unit_of_measurement: min
    cooldown_duration_m:
      selector:
        number:
          min: 1
          max: 180
          unit_of_measurement: min
    notify_targets:
      selector:
        text:
    enable_persistent_notifications:
      selector:
        boolean:
    enable_event_bus:
      selector:
        boolean:
    notification_title_template:
      selector:
        text:
    notification_message_template:
      selector:
        text:
    notification_priority:
      selector:
        select:
          options:
            - "default"
            - "passive"
            - "active"
            - "time-sensitive"
            - "critical"
