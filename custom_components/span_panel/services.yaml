export_circuit_manifest:

set_circuit_threshold:
  fields:
    circuit_id:
      required: true
      selector:
        entity:
          domain: sensor
          integration: span_panel
          device_class: current
    continuous_threshold_pct:
      selector:
        number:
          min: 1
          max: 200
          unit_of_measurement: "%"
    spike_threshold_pct:
      selector:
        number:
          min: 1
          max: 200
          unit_of_measurement: "%"
    window_duration_m:
      selector:
        number:
          min: 1
          max: 180
          unit_of_measurement: min
    cooldown_duration_m:
      selector:
        number:
          min: 1
          max: 180
          unit_of_measurement: min
    monitoring_enabled:
      selector:
        boolean:
    config_entry_id:
      selector:
        config_entry:
          integration: span_panel

clear_circuit_threshold:
  fields:
    circuit_id:
      required: true
      selector:
        entity:
          domain: sensor
          integration: span_panel
          device_class: current
    config_entry_id:
      selector:
        config_entry:
          integration: span_panel

set_mains_threshold:
  fields:
    leg:
      required: true
      selector:
        entity:
          domain: sensor
          integration: span_panel
          device_class: current
    continuous_threshold_pct:
      selector:
        number:
          min: 1
          max: 200
          unit_of_measurement: "%"
    spike_threshold_pct:
