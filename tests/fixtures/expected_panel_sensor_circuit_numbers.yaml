# Expected YAML structure for panel and circuit sensors with circuit numbers
# Configuration: {"use_device_prefix": True, "use_circuit_numbers": True}
# USE_DEVICE_PREFIX: True, USE_CIRCUIT_NUMBERS: True

# Panel-level sensor: Device prefix included (circuit numbers don't affect panel sensors)
span_sp3_242424_001_instantgridpowerw:
  name: "Current Power"
  entity_id: "sensor.span_panel_current_power"
  formula: "source_value"
  variables:
    source_value: "span_panel_synthetic_backing.circuit_0_instant_grid_power"
  unit_of_measurement: "W"
  device_class: "power"
  state_class: "measurement"
  device_identifier: "span_panel_sp3_242424_001"

# Circuit-level sensor: Device prefix + circuit number instead of friendly name
span_sp3_242424_001_circuit_1_instantpowerw:
  name: "Circuit 1 Power"
  entity_id: "sensor.span_panel_circuit_1_power"
  formula: "source_value"
  variables:
    source_value: "span_panel_synthetic_backing.circuit_1_power"
  unit_of_measurement: "W"
  device_class: "power"
  state_class: "measurement"
  device_identifier: "span_panel_sp3_242424_001"
